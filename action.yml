name: 'Agent Security Harness'
description: 'Run protocol-level security tests against MCP/A2A/L402/x402 agent endpoints as a CI/CD gate'
author: 'msaleme'

branding:
  icon: 'shield'
  color: 'red'

inputs:
  target_url:
    description: 'MCP server URL to test (e.g. http://localhost:8080/mcp)'
    required: true
  transport:
    description: 'Transport type: http or stdio'
    required: false
    default: 'http'
  categories:
    description: 'Comma-separated test categories to run (optional, runs all if omitted)'
    required: false
    default: ''
  fail_on:
    description: 'Fail threshold: any (fail on any test failure), critical (fail only on critical), none (never fail)'
    required: false
    default: 'critical'
  python_version:
    description: 'Python version to use'
    required: false
    default: '3.12'
  harness_version:
    description: 'agent-security-harness PyPI version (empty for latest)'
    required: false
    default: ''

outputs:
  report_path:
    description: 'Path to the JSON report file'
    value: ${{ steps.run-harness.outputs.report_path }}
  total_tests:
    description: 'Total number of tests executed'
    value: ${{ steps.parse-report.outputs.total_tests }}
  passed:
    description: 'Number of passed tests'
    value: ${{ steps.parse-report.outputs.passed }}
  failed:
    description: 'Number of failed tests'
    value: ${{ steps.parse-report.outputs.failed }}
  critical_failures:
    description: 'Number of critical test failures'
    value: ${{ steps.parse-report.outputs.critical_failures }}

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      with:
        python-version: ${{ inputs.python_version }}

    - name: Install agent-security-harness
      shell: bash
      run: |
        if [ -n "$HARNESS_VERSION" ]; then
          pip install "agent-security-harness==${HARNESS_VERSION}"
        else
          pip install agent-security-harness
        fi
      env:
        HARNESS_VERSION: ${{ inputs.harness_version }}

    - name: Run security harness
      id: run-harness
      shell: bash
      run: |
        REPORT_FILE="security-report-$(date +%s).json"
        CMD="python -m protocol_tests.mcp_harness --transport ${INPUT_TRANSPORT} --url ${INPUT_TARGET_URL} --report ${REPORT_FILE}"

        if [ -n "$INPUT_CATEGORIES" ]; then
          CMD="${CMD} --categories ${INPUT_CATEGORIES}"
        fi

        echo "Running: ${CMD}"
        ${CMD} || true

        echo "report_path=${REPORT_FILE}" >> "$GITHUB_OUTPUT"
      env:
        INPUT_TARGET_URL: ${{ inputs.target_url }}
        INPUT_TRANSPORT: ${{ inputs.transport }}
        INPUT_CATEGORIES: ${{ inputs.categories }}

    - name: Parse report
      id: parse-report
      shell: bash
      run: |
        if [ ! -f "${REPORT_PATH}" ]; then
          echo "::error::Security report not found at ${REPORT_PATH}"
          echo "total_tests=0" >> "$GITHUB_OUTPUT"
          echo "passed=0" >> "$GITHUB_OUTPUT"
          echo "failed=0" >> "$GITHUB_OUTPUT"
          echo "critical_failures=0" >> "$GITHUB_OUTPUT"
          exit 1
        fi

        python3 << 'PARSE_EOF'
        import json, os

        report_path = os.environ["REPORT_PATH"]
        gh_output = os.environ["GITHUB_OUTPUT"]
        gh_summary = os.environ["GITHUB_STEP_SUMMARY"]

        with open(report_path) as f:
            r = json.load(f)

        results = r.get("results", [])
        summary = r.get("summary", {})

        total = summary.get("total", len(results))
        passed = summary.get("passed", sum(1 for t in results if t.get("status") == "PASS"))
        failed = summary.get("failed", sum(1 for t in results if t.get("status") == "FAIL"))
        critical = sum(1 for t in results if t.get("status") == "FAIL" and t.get("severity", "").lower() == "critical")

        with open(gh_output, "a") as out:
            out.write(f"total_tests={total}\n")
            out.write(f"passed={passed}\n")
            out.write(f"failed={failed}\n")
            out.write(f"critical_failures={critical}\n")

        lines = [
            "### Security Harness Results\n",
            "| Metric | Count |",
            "|--------|-------|",
            f"| Total Tests | {total} |",
            f"| Passed | {passed} |",
            f"| Failed | {failed} |",
            f"| Critical Failures | {critical} |",
            "",
        ]

        fails = [t for t in results if t.get("status") == "FAIL"]
        if fails:
            lines.append("| Test | Severity | Details |")
            lines.append("|------|----------|---------|")
            for t in fails:
                name = t.get("test_id", t.get("name", "unknown"))
                sev = t.get("severity", "unknown")
                detail = t.get("detail", t.get("message", ""))[:80]
                lines.append(f"| {name} | {sev} | {detail} |")

        with open(gh_summary, "a") as ss:
            ss.write("\n".join(lines))
        PARSE_EOF
      env:
        REPORT_PATH: ${{ steps.run-harness.outputs.report_path }}

    - name: Evaluate threshold
      shell: bash
      run: |
        FAIL_ON="${INPUT_FAIL_ON}"
        FAILED="${INPUT_FAILED}"
        CRITICAL="${INPUT_CRITICAL}"

        if [ "${FAIL_ON}" = "any" ] && [ "${FAILED}" -gt 0 ]; then
          echo "::error::${FAILED} test(s) failed (fail_on=any)"
          exit 1
        elif [ "${FAIL_ON}" = "critical" ] && [ "${CRITICAL}" -gt 0 ]; then
          echo "::error::${CRITICAL} critical test(s) failed (fail_on=critical)"
          exit 1
        elif [ "${FAIL_ON}" = "none" ]; then
          echo "Threshold set to 'none' - not failing regardless of results"
        fi

        echo "Security scan passed threshold (fail_on=${FAIL_ON})"
      env:
        INPUT_FAIL_ON: ${{ inputs.fail_on }}
        INPUT_FAILED: ${{ steps.parse-report.outputs.failed }}
        INPUT_CRITICAL: ${{ steps.parse-report.outputs.critical_failures }}
