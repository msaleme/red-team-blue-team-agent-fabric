            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: mcp_document
                codec_type: AUTO
                route_config:
                  name: mcp_document_route
                  virtual_hosts:
                    - name: mcp_document
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
                          route: { cluster: mock-mcp-document }
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

    # ── MCP JSON-RPC (port 8088) — proxied MCP protocol ──
    - name: mcp_jsonrpc
      address:
        socket_address: { address: 0.0.0.0, port_value: 8088 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: mcp_jsonrpc
                codec_type: AUTO
                route_config:
                  name: mcp_jsonrpc_route
                  virtual_hosts:
                    - name: mcp_jsonrpc
                      domains: ["*"]
