                        - match: { prefix: "/" }
                          route: { cluster: mock-mcp-jsonrpc }
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: mock-app1
      connect_timeout: 5s
      type: STRICT_DNS
      load_assignment:
        cluster_name: mock-app1
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: mock-app1, port_value: 9081 }

