static_resources:
  listeners:
    # ── APP1: AI/ML Agent (port 8081) ──
    - name: app1
      address:
        socket_address: { address: 0.0.0.0, port_value: 8081 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: app1
                codec_type: AUTO
                route_config:
                  name: app1_route
                  virtual_hosts:
                    - name: app1
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
                          route: { cluster: mock-app1 }
                http_filters:
                  - name: envoy.filters.http.buffer
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.buffer.v3.Buffer
                      max_request_bytes: 102400  # 100KB - catches RT-009 long context
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

    # ── APP2: Finance Agent (port 8082) ──
    - name: app2
      address:
        socket_address: { address: 0.0.0.0, port_value: 8082 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: app2
                codec_type: AUTO
                route_config:
                  name: app2_route
                  virtual_hosts:
                    - name: app2
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
                          route: { cluster: mock-app2 }
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

    # ── APP3: placeholder (port 8083) ──
    - name: app3
      address:
        socket_address: { address: 0.0.0.0, port_value: 8083 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: app3
                codec_type: AUTO
                route_config:
                  name: app3_route
                  virtual_hosts:
                    - name: app3
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
                          route: { cluster: mock-app3 }
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

    # ── BROKER: Agent orchestration (port 8084) with rate limiting ──
    - name: broker
      address:
        socket_address: { address: 0.0.0.0, port_value: 8084 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: broker
                codec_type: AUTO
                route_config:
                  name: broker_route
                  virtual_hosts:
                    - name: broker
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
                          route: { cluster: mock-broker }
                http_filters:
                  - name: envoy.filters.http.local_ratelimit
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.local_ratelimit.v3.LocalRateLimit
                      stat_prefix: broker_rate_limit
                      token_bucket:
                        max_tokens: 50
                        tokens_per_fill: 50
                        fill_interval: 60s
                      filter_enabled:
                        runtime_key: local_rate_limit_enabled
                        default_value: { numerator: 100, denominator: HUNDRED }
                      filter_enforced:
                        runtime_key: local_rate_limit_enforced
                        default_value: { numerator: 100, denominator: HUNDRED }
                      response_headers_to_add:
                        - append_action: OVERWRITE_IF_EXISTS_OR_ADD
                          header:
                            key: x-rate-limited
                            value: "true"
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

    # ── MCP SAFETY (port 8085) ──
    - name: mcp_safety
      address:
        socket_address: { address: 0.0.0.0, port_value: 8085 }
      filter_chains:
