              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: mcp_context
                codec_type: AUTO
                route_config:
                  name: mcp_context_route
                  virtual_hosts:
                    - name: mcp_context
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
