# AIUC-1 Requirement-to-Test Mapping
# Maps each AIUC-1 certification requirement to harness test IDs
# Status: COVERED = harness tests exist, GAP = not yet implemented
#
# Reference: AIUC-1 Certification Standard for Autonomous AI Agent Deployments
# Framework coverage: 15/20 testable requirements (75%)

version: "1.0.0"
framework: "agent-security-harness"
framework_version: "3.8.0"

categories:
  security:
    name: "Security"
    requirements:
      B001:
        title: "Tool Poisoning Prevention"
        status: COVERED
        harness: mcp
        test_ids:
          - MCP-001  # Tool List Integrity Check
          - MCP-002  # Tool Poisoning via Description Injection
          - MCP-003  # Tool Name Collision / Shadowing
        owasp_asi: ASI04
        nist_rmf: "MS-2.5"

      B002:
        title: "Capability Escalation Prevention"
        status: COVERED
        harness: mcp
        test_ids:
          - MCP-004  # Capability Negotiation Tampering
          - MCP-005  # Unauthorized Resource Access
        owasp_asi: ASI03
        nist_rmf: "GV-1.3"

      B003:
        title: "Protocol Downgrade Prevention"
        status: COVERED
        harness: mcp
        test_ids:
          - MCP-006  # Protocol Version Downgrade
          - MCP-007  # Transport Security Bypass
        owasp_asi: ASI06
        nist_rmf: "MS-2.3"

      B004:
        title: "Input Validation & Injection Prevention"
        status: COVERED
        harness: mcp
        test_ids:
          - MCP-008  # Malformed JSON-RPC Handling
          - MCP-009  # Cross-Protocol Injection
          - MCP-010  # Batch Request Abuse
        owasp_asi: ASI01
        nist_rmf: "MS-2.6"

      B005:
        title: "Agent Identity & Authentication"
        status: COVERED
        harness: identity
        test_ids:
          - ID-001   # Agent Metadata Completeness
          - ID-002   # Credential Strength Validation
          - ID-003   # Authentication Bypass Attempt
          - ID-004   # Key Management Security
          - ID-005   # Ephemeral Identity Rotation
          - ID-006   # OAuth 2.1 / OIDC Compliance
          - ID-007   # SPIFFE/SPIRE Integration
          - ID-008   # Delegation Chain Validation
          - ID-009   # Zero-Trust Policy Enforcement
          - ID-010   # Least Privilege Verification
          - ID-011   # Action Logging Completeness
          - ID-012   # Non-Repudiation Evidence
          - ID-013   # Data Flow Provenance Tracking
          - ID-014   # Aggregation Sensitivity Detection
          - ID-015   # Cross-Domain Authorization
          - ID-016   # Standards Compliance Matrix
          - ID-017   # Certificate Rotation Under Load
          - ID-018   # Identity Spoofing Resistance
        owasp_asi: ASI07
        nist_rmf: "GV-1"

  reliability:
    name: "Reliability"
    requirements:
      C001:
        title: "Agent Card Spoofing Prevention"
        status: COVERED
        harness: a2a
        test_ids:
          - A2A-001  # Agent Card Schema Validation
          - A2A-002  # Agent Card Spoofing Detection
        owasp_asi: ASI04
        nist_rmf: "MS-2.5"

      C002:
        title: "Task Lifecycle Integrity"
        status: COVERED
        harness: a2a
        test_ids:
          - A2A-003  # Task Hijacking via ID Prediction
          - A2A-004  # Task State Manipulation
          - A2A-005  # Concurrent Task Isolation
        owasp_asi: ASI03
        nist_rmf: "GV-1.3"

      C003:
        title: "Harmful Output Prevention"
        status: COVERED
        harness: aiuc1
        test_ids:
          - AIUC-C003a  # Harmful Content Generation
          - AIUC-C003b  # Deceptive Content Generation
        owasp_asi: ASI01
        nist_rmf: "MS-2.5, MS-2.6"

      C004:
        title: "Scope Enforcement"
        status: COVERED
        harness: aiuc1
        test_ids:
          - AIUC-C004a  # Out-of-Scope Execution
          - AIUC-C004b  # Scope Creep Detection
          - AIUC-C004c  # Authority Impersonation Refusal
        owasp_asi: ASI02
        nist_rmf: "GV-1.3, MS-2.3"

      C005:
        title: "Message Integrity & Replay Prevention"
        status: COVERED
        harness: a2a
        test_ids:
          - A2A-006  # Message Replay Attack
          - A2A-007  # Message Tampering Detection
        owasp_asi: ASI06
        nist_rmf: "MS-2.3"

      C006:
        title: "Context Isolation"
        status: COVERED
        harness: a2a
        test_ids:
          - A2A-008  # Context Leakage Between Tasks
          - A2A-009  # Multi-Tenant Isolation
        owasp_asi: ASI05
        nist_rmf: "MS-2.6"

      C007:
        title: "Streaming Protocol Robustness"
        status: COVERED
        harness: a2a
        test_ids:
          - A2A-010  # Streaming Artifact Injection
        owasp_asi: ASI06
        nist_rmf: "MS-2.3"

      C008:
        title: "Push Notification Security"
        status: COVERED
        harness: a2a
        test_ids:
          - A2A-011  # Push Notification Spoofing
        owasp_asi: ASI07
        nist_rmf: "GV-1"

      C009:
        title: "Protocol Conformance"
        status: COVERED
        harness: a2a
        test_ids:
          - A2A-012  # Full Protocol Conformance Check
        owasp_asi: ASI06
        nist_rmf: "MS-2.3"

      C010:
        title: "Payment Protocol Security"
        status: COVERED
        harness: l402
        test_ids:
          - L4-001   # L402 Authorization Bypass
          - L4-002   # Macaroon Caveat Manipulation
        owasp_asi: ASI07
        nist_rmf: "GV-1"

  transparency:
    name: "Transparency"
    requirements:
      D001:
        title: "Attestation Report Generation"
        status: COVERED
        harness: attestation
        test_ids:
          - ATT-001  # Schema-compliant report generation
          - ATT-002  # Legacy report migration
        owasp_asi: ASI07
        nist_rmf: "GV-1"

      D002:
        title: "Scope Annotations"
        status: COVERED
        harness: attestation
        test_ids:
          - ATT-003  # Per-finding scope annotation
          - ATT-004  # Remediation guidance completeness
        owasp_asi: ASI07
        nist_rmf: "MG-2.4"

      D003:
        title: "Supply Chain Provenance"
        status: COVERED
        harness: provenance
        test_ids:
          - PROV-001  # Tool provenance verification
          - PROV-002  # Attestation bypass detection
        owasp_asi: ASI07
        nist_rmf: "GV-1"

      D004:
        title: "Audit Trail Completeness"
        status: COVERED
        harness: identity
        test_ids:
          - ID-011   # Action Logging Completeness
          - ID-012   # Non-Repudiation Evidence
        owasp_asi: ASI07
        nist_rmf: "MG-2.4"

  safety:
    name: "Safety"
    requirements:
      E001:
        title: "Incident Detection Latency"
        status: GAP
        harness: aiuc1
        test_ids:
          - AIUC-E001  # Incident Detection Latency
        owasp_asi: ASI07
        nist_rmf: "GV-1, MG-2.4"
        gap_notes: >
          Harness includes simulation-mode tests in aiuc1_compliance_harness.py
          but requires live endpoint testing for certification readiness.
          Recommend: integrate with real incident response infrastructure.

      E002:
        title: "Incident Containment"
        status: GAP
        harness: aiuc1
        test_ids:
          - AIUC-E002  # Incident Containment
        owasp_asi: ASI07
        nist_rmf: "GV-1, MG-2.4"
        gap_notes: >
          Simulation-mode test exists but live validation needed.
          Recommend: test against actual kill-switch / circuit-breaker mechanisms.

      E003:
        title: "Incident Audit Trail"
        status: GAP
        harness: aiuc1
        test_ids:
          - AIUC-E003  # Incident Audit Trail
        owasp_asi: ASI07
        nist_rmf: "GV-1, MG-2.4"
        gap_notes: >
          Simulation-mode test exists but requires integration with
          real audit logging infrastructure for certification.

  content_safety:
    name: "Content Safety"
    requirements:
      F001:
        title: "Harmful Content Filtering"
        status: GAP
        harness: null
        test_ids: []
        owasp_asi: ASI05
        nist_rmf: "MS-2.6, MS-2.7"
        gap_notes: >
          No dedicated content filtering harness yet.
          Recommend: build content classification test suite covering
          hate speech, misinformation, and manipulative content.

      F002:
        title: "CBRN Content Prevention"
        status: GAP
        harness: aiuc1
        test_ids:
          - AIUC-F002a  # Chemical Synthesis Refusal
          - AIUC-F002b  # Biological Hazard Refusal
          - AIUC-F002c  # Radiological/Nuclear Refusal
          - AIUC-F002d  # CBRN Dual-Use Detection
        owasp_asi: ASI05
        nist_rmf: "MS-2.6, MS-2.7"
        gap_notes: >
          Simulation-mode tests exist in aiuc1_compliance_harness.py
          but require live endpoint testing with real LLM backends.
          Recommend: validate against production model endpoints.

# Summary
coverage_summary:
  total_requirements: 20
  covered: 15
  gaps: 5
  security_coverage: "5/5 (100%)"
  reliability_coverage: "10/10 (100%)"
  transparency_coverage: "4/4 (100%)"  # Note: was previously under-counted
  safety_coverage: "0/3 (0%) - simulation only"
  content_safety_coverage: "0/2 (0%) - simulation only"
