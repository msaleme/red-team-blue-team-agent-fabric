name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e . pyyaml pytest

      - name: Verify CLI
        run: |
          agent-security --help
          agent-security version
          agent-security list

      - name: Verify all modules import
        run: |
          python -c "
          import protocol_tests.mcp_harness
          import protocol_tests.a2a_harness
          import protocol_tests.l402_harness
          import protocol_tests.x402_harness
          import protocol_tests.enterprise_adapters
          import protocol_tests.extended_enterprise_adapters
          import protocol_tests.framework_adapters
          import protocol_tests.identity_harness
          import protocol_tests.gtg1002_simulation
          import protocol_tests.advanced_attacks
          import protocol_tests.over_refusal_harness
          import protocol_tests.provenance_harness
          import protocol_tests.jailbreak_harness
          import protocol_tests.return_channel_harness
          import protocol_tests.capability_profile_harness
          import protocol_tests.harmful_output_harness
          import protocol_tests.cbrn_harness
          import protocol_tests.incident_response_harness
          import protocol_tests.cve_2026_25253_harness
          import protocol_tests.aiuc1_compliance_harness
          import protocol_tests.cloud_agent_harness
          import protocol_tests.statistical
          import protocol_tests.cli
          import protocol_tests.kill_switch_harness
          import protocol_tests.watermark_harness
          import protocol_tests.memory_harness
          import protocol_tests.multi_agent_harness
          import protocol_tests.autogen_harness
          import protocol_tests.intent_contract_harness
          import protocol_tests.crewai_cve_harness
          import protocol_tests.benchmark_integrity_harness
          import protocol_tests.governance_modification_harness
          import protocol_tests.skill_security_harness
          import protocol_tests.community_runner
          import scripts.auroc
          import scripts.compliance_crosswalk
          import scripts.fria_evidence
          import scripts.compliance_report
          print('All 36 modules import successfully')
          "

      - name: Run pytest
        run: |
          pip install pytest pyyaml
          python -m pytest tests/ -v --tb=short

      - name: Verify all harness --list commands
        run: |
          agent-security list mcp
          agent-security list a2a
          agent-security list l402
          agent-security list x402
          agent-security list enterprise
          agent-security list framework
          agent-security list identity
          agent-security list gtg1002
          agent-security list advanced
          agent-security list cve-2026-25253
          agent-security list aiuc1
          agent-security list cloud-agents

      - name: Run self-tests
        if: hashFiles('testing/') != ''
        run: |
          pip install pytest
          python -m pytest testing/ -v --tb=short

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Syntax check all modules
        run: |
          python -m py_compile protocol_tests/cli.py
          python -m py_compile protocol_tests/mcp_harness.py
          python -m py_compile protocol_tests/a2a_harness.py
          python -m py_compile protocol_tests/l402_harness.py
          python -m py_compile protocol_tests/x402_harness.py
          python -m py_compile protocol_tests/enterprise_adapters.py
          python -m py_compile protocol_tests/extended_enterprise_adapters.py
          python -m py_compile protocol_tests/framework_adapters.py
          python -m py_compile protocol_tests/identity_harness.py
          python -m py_compile protocol_tests/gtg1002_simulation.py
          python -m py_compile protocol_tests/advanced_attacks.py
          python -m py_compile protocol_tests/statistical.py
          python -m py_compile protocol_tests/kill_switch_harness.py
          python -m py_compile protocol_tests/watermark_harness.py
          python -m py_compile scripts/auroc.py
          python -m py_compile scripts/compliance_crosswalk.py
          python -m py_compile scripts/fria_evidence.py
          python -m py_compile scripts/compliance_report.py
          echo "All modules pass syntax check"

      - name: Check for unique test IDs
        run: |
          python -c "
          import re, sys
          from pathlib import Path
          # Check that each test ID is only defined in ONE test method across all harnesses.
          # IDs can appear multiple times in the same method (error branch + success branch).
          method_ids = {}  # {test_id: set of (file, method_name)}
          for f in Path('protocol_tests').glob('*.py'):
              content = f.read_text()
              # Split into methods and find test_id assignments per method
              for match in re.finditer(r'def (test_\w+)\(self\)(.*?)(?=\n    def |\Z)', content, re.DOTALL):
                  method_name = match.group(1)
                  method_body = match.group(2)
                  ids_in_method = set(re.findall(r'test_id=[\"\\']([A-Z][A-Z0-9]*-[A-Z0-9]{3,}[a-z]?)[\"\\']', method_body))
                  for tid in ids_in_method:
                      if tid not in method_ids:
                          method_ids[tid] = set()
                      method_ids[tid].add((f.name, method_name))
          dupes = {k: v for k, v in method_ids.items() if len(v) > 1}
          if dupes:
              print(f'DUPLICATE TEST IDS (used in multiple methods):')
              for tid, locations in dupes.items():
                  print(f'  {tid}: {locations}')
              sys.exit(1)
          print(f'All {len(method_ids)} test IDs are unique across methods')
          "
